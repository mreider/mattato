<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mattato - Pomodoro Timer for macOS</title>
    <meta name="description" content="A Pomodoro timer for macOS with session tracking, Bear integration, and markdown export.">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mreider.github.io/mattato/">
    <meta property="og:title" content="Mattato - Pomodoro Timer for macOS">
    <meta property="og:description" content="A beautiful menu bar Pomodoro timer for macOS with session tracking, Bear integration, and markdown export.">
    <meta property="og:image" content="https://mreider.github.io/mattato/tomato-512x512.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://mreider.github.io/mattato/">
    <meta property="twitter:title" content="Mattato - Pomodoro Timer for macOS">
    <meta property="twitter:description" content="A beautiful menu bar Pomodoro timer for macOS with session tracking, Bear integration, and markdown export.">
    <meta property="twitter:image" content="https://mreider.github.io/mattato/tomato-512x512.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .tomato-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            animation: bounce 2s infinite;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.1));
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 40px 0;
            text-align: left;
        }

        .feature {
            background: rgba(255, 255, 255, 0.7);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .feature h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .feature p {
            color: #666;
            font-size: 0.9rem;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            margin-top: 40px;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            min-width: 250px;
            justify-content: center;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        .coffee-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #FFDD00;
            color: #333;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 221, 0, 0.3);
        }

        .coffee-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 221, 0, 0.4);
            background: #FFE55C;
        }

        .system-requirements {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            font-size: 0.9rem;
            color: #666;
        }

        .github-link {
            margin-top: 20px;
        }

        .github-link a {
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .github-link a:hover {
            color: #333;
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 20px;
            }

            h1 {
                font-size: 2.5rem;
            }

            .tomato-icon {
                width: 100px;
                height: 100px;
            }

            .features {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .buttons {
                gap: 15px;
            }

            .download-btn {
                min-width: 200px;
                font-size: 1rem;
                padding: 14px 28px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 15px;
            }

            h1 {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .tomato-icon {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="tomato-512x512.png" alt="Mattato Tomato Icon" class="tomato-icon">
        
        <h1>Mattato</h1>
        <p class="subtitle">A Pomodoro timer with session tracking</p>
        <div class="features">
        <div class="feature">
                <p>🗒️ <b>Capture</b>: a history of your sessions</p>
        </div>
        <div class="feature">
                <p>🐻 <b>Export</b>: to Bear and  Markdown</p>
        </div>
        </div>
        
        <div class="buttons">
            <a href="#" id="download-link" class="download-btn">
                <span>📥</span>
                <span>Download Latest Release</span>
            </a>
            
            <a href="https://buymeacoffee.com/mreider" target="_blank" rel="noopener" class="coffee-btn">
                <span>☕</span>
                <span>Buy me a coffee</span>
            </a>
        </div>

        <div class="system-requirements">
            <strong>System Requirements:</strong><br>
            macOS 13.0 or later • Apple Silicon or Intel Mac
        </div>

        <div class="github-link">
            <a href="https://github.com/mreider/mattato" target="_blank" rel="noopener">
                View on GitHub →
            </a>
        </div>
    </div>

    <script>
        // Fetch the latest release from GitHub API
        async function updateDownloadLink() {
            try {
                const response = await fetch('https://api.github.com/repos/mreider/mattato/releases/latest');
                const release = await response.json();
                
                if (release && release.assets && release.assets.length > 0) {
                    // Find the DMG asset
                    const dmgAsset = release.assets.find(asset => asset.name.endsWith('.dmg'));
                    
                    if (dmgAsset) {
                        const downloadLink = document.getElementById('download-link');
                        downloadLink.href = dmgAsset.browser_download_url;
                        downloadLink.innerHTML = `
                            <span>📥</span>
                            <span>Download ${release.tag_name}</span>
                        `;
                    }
                }
            } catch (error) {
                console.log('Could not fetch latest release:', error);
                // Fallback to releases page
                const downloadLink = document.getElementById('download-link');
                downloadLink.href = 'https://github.com/mreider/mattato/releases/latest';
            }
        }

        // Update download link when page loads
        updateDownloadLink();
    </script>
</body>
</html>
